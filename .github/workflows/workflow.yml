name: workflow

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lock:
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Setup uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
      - run: uv lock
      - uses: actions/cache@v3
        with:
          path: uv.lock
          key: ${{ github.sha }}-${{ matrix.python-version }}

  pytest:
    needs: lock
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        implementation: [
          {flavor: "dynalite", name: "dynalite"},
          {flavor: "other", name: "dynamodb-local"},
          {flavor: "other", name: "localstack"},
          {flavor: "scylla", name: "scylla"}
        ]
    runs-on: "ubuntu-latest"
    env:
      DYNAMODB_URL: http://localhost:8000
      DYNAMODB_FLAVOR: ${{ matrix.implementation.flavor }}
      DYNAMODB_NAME: ${{ matrix.implementation.name }}
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
    steps:
      - uses: actions/checkout@v3
      - run: docker compose -f .github/docker-compose/docker-compose.${{ matrix.implementation.name }}.yml up -d
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/cache@v3
        with:
          path: uv.lock
          key: ${{ github.sha }}-${{ matrix.python-version }}
          fail-on-cache-miss: true
      - name: Setup uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
      - run: uv sync --frozen
      - run: uv run --frozen --no-sync pytest --verbose

  mypy:
    timeout-minutes: 10
    needs: lock
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/cache@v3
        with:
          path: uv.lock
          key: ${{ github.sha }}-${{ matrix.python-version }}
          fail-on-cache-miss: true
      - name: Setup uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
      - run: uv sync --frozen
      - run: uv run --frozen --no-sync mypy

  ruff:
    timeout-minutes: 10
    needs: lock
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.14"
      - uses: actions/cache@v3
        with:
          path: uv.lock
          key: ${{ github.sha }}-3.14
          fail-on-cache-miss: true
      - name: Setup uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
      - run: uv sync --frozen
      - run: uv run --frozen --no-sync ruff check src/ tests/

  ruff-format:
    timeout-minutes: 10
    needs: lock
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.14"
      - uses: actions/cache@v3
        with:
          path: uv.lock
          key: ${{ github.sha }}-3.14
          fail-on-cache-miss: true
      - name: Setup uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
      - run: uv sync --frozen
      - run: uv run --frozen --no-sync ruff format --check src/ tests/
